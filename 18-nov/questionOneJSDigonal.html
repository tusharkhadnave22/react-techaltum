<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #show {
    white-space: pre;
}
    </style>
    <script>
    "use strict"
    let fix_space="          ";
    let originalContent="";

    function extractOriginalContent(){
        originalContent = document.getElementById("show").innerText;
    }

    function movenextLine3(){
        
        let ele = document.getElementById("show");
        ele.innerText =ele.innerText+"\n"+fix_space+ originalContent;
        fix_space +="          ";  
    }
    
    setTimeout(extractOriginalContent,1);
    let intervalid =  setInterval(movenextLine3,1000);
    setTimeout(()=>clearInterval(intervalid),17000);

    </script>
</head>
<body>
    <h1  id ="show" >javaScript</h1>
 
</body>
</html>
